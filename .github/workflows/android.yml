name: Android CI

on:
  push:
    branches:
      - main
      - master
      - 'v**'
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Create debug keystore
        run: |
          if [ ! -f debug.keystore ]; then
            keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -dname "cn=Unknown, ou=Unknown, o=Unknown, c=Unknown" -storepass android -keypass android
          fi

      - name: Set environmental variables
        shell: bash
        env:
          JSON_CONTENT: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$JSON_CONTENT" ]; then
            printf 'GOOGLE_SERVICES_JSON<<EOF\n%s\nEOF\n' "$JSON_CONTENT" >> $GITHUB_ENV
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APKs
        env:
          SKETCHUB_API_KEY: ${{ secrets.SKETCHUB_API_KEY }}
        run: gradle assembleDebug assembleRelease

      - name: Set short SHA
        id: set_sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Prepare Artifacts
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk artifacts/sketchware-ide-debug-${{ steps.set_sha.outputs.short_sha }}.apk
          cp app/build/outputs/apk/release/app-release.apk artifacts/sketchware-ide-release-${{ steps.set_sha.outputs.short_sha }}.apk

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: sketchware-ide-apks-${{ steps.set_sha.outputs.short_sha }}
          path: artifacts/*.apk
